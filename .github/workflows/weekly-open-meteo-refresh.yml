name: Weekly Open-Meteo refresh

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      cadaster_limit:
        description: "Optional cadaster limit for a smoke test. Leave blank for every cadaster."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: weekly-open-meteo-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Refresh weather, flood, and prediction data
        run: |
          args=(--rate-limit-seconds 0.25)
          if [ -n "${{ inputs.cadaster_limit }}" ]; then
            args+=(--limit "${{ inputs.cadaster_limit }}")
          fi
          python ml/weekly_open_meteo_refresh.py "${args[@]}"

      - name: Rebuild RAG documents
        run: python rag/build_rag_docs.py

      - name: Validate model fixture
        run: python ml/validate_open_meteo_model.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/open_meteo data/predictions frontend/src/data rag/vector_store/rag_documents.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Refresh Open-Meteo flood risk data"
            git push
          fi
