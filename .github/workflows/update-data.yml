name: Update flood-risk data

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Build Open-Meteo predictions and rebuild RAG docs
        run: |
          python ml/build_open_meteo_predictions.py
          python rag/build_rag_docs.py
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update flood-risk predictions"
          file_pattern: "data/predictions/risk_predictions.csv data/predictions/risk_predictions.json frontend/src/data/risk_predictions.json rag/vector_store/rag_documents.json"
